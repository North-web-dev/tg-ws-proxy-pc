name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
          - name: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Linux GUI deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-render0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxkbcommon-dev libgl1-mesa-dev libwayland-dev

      - name: Build CLI
        run: cargo build --release --locked --target ${{ matrix.target }} --bin tgwsproxy-cli

      - name: Build GUI
        run: cargo build --release --locked --features gui --target ${{ matrix.target }} --bin tgwsproxy-gui

      - name: Stage artifacts
        shell: bash
        run: |
          mkdir -p dist
          ext=""
          [ "${{ runner.os }}" = "Windows" ] && ext=".exe"
          cp "target/${{ matrix.target }}/release/tgwsproxy-cli$ext" "dist/tgwsproxy-cli-${{ matrix.name }}$ext"
          cp "target/${{ matrix.target }}/release/tgwsproxy-gui$ext" "dist/tgwsproxy-gui-${{ matrix.name }}$ext"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/*

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
